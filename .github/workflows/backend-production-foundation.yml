name: Sprint 2A quality gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - ".github/workflows/backend-production-foundation.yml"
      - "docs/adr/**"
      - "docs/superpowers/**"

permissions:
  contents: read

concurrency:
  group: sprint-2a-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hai_dau_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hai_dau_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/hai_dau_test
      TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Root orchestration and runbook contract
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";

          const rootPackage = JSON.parse(await readFile("package.json", "utf8"));
          const expectedScripts = {
            "backend:typecheck": "npm --prefix backend run typecheck",
            "backend:test": "npm --prefix backend test",
            "backend:build": "npm --prefix backend run build",
          };
          for (const [name, command] of Object.entries(expectedScripts)) {
            if (rootPackage.scripts?.[name] !== command) {
              throw new Error(`missing root orchestration script ${name}`);
            }
          }

          const runbook = await readFile("backend/README.md", "utf8");
          for (const contract of [
            "PostgreSQL 17",
            "Redis 7",
            "TEST_DATABASE_URL",
            "TEST_REDIS_URL",
            "reference_only",
            "retryable_failed",
            "No AI",
            "No publication",
            "No production credentials",
            "No deployment",
          ]) {
            if (!runbook.includes(contract)) {
              throw new Error(`backend runbook is missing contract: ${contract}`);
            }
          }
          NODE

      - name: Install frontend dependencies
        run: npm ci --cache /tmp/aram-root-npm-cache

      - name: Install backend dependencies
        run: npm --prefix backend ci --cache /tmp/aram-backend-npm-cache

      - name: Validate community data
        run: npm run validate:community

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Canonical frontend Pages build
        run: npm run build:pages

      - name: Backend typecheck
        run: npm run backend:typecheck

      - name: Backend tests
        run: npm run backend:test

      - name: Backend build
        run: npm run backend:build

      - name: Repository cleanliness
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --short)"

      - name: Deployment guard
        shell: bash
        run: |
          set -euo pipefail
          workflow=".github/workflows/backend-production-foundation.yml"
          executable="$RUNNER_TEMP/sprint-2a-workflow-before-guard.yml"
          sed '/- name: Deployment guard/,$d' "$workflow" > "$executable"
          ! grep -Eq '(contents|packages|pages|id-token):[[:space:]]*write' "$workflow"
          ! grep -Eq 'git push|wrangler[[:space:]]+deploy|npm run deploy|actions/deploy-pages' "$executable"
