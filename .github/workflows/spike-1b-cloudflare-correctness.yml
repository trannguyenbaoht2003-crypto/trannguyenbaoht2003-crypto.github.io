name: Sprint 1B-A Cloudflare Correctness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'spikes/backend-correctness/common/**'
      - 'spikes/backend-correctness/platform-a-cloudflare/**'
      - '.github/workflows/spike-1b-cloudflare-correctness.yml'

permissions:
  contents: read

jobs:
  red-green:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify locked Common Harness
        shell: bash
        run: |
          set -euo pipefail
          test -f spikes/backend-correctness/common/common-harness.test.mjs
          node --test spikes/backend-correctness/common/common-harness.test.mjs

      - name: Run Platform A contract tests
        shell: bash
        run: |
          set -o pipefail
          node --test spikes/backend-correctness/platform-a-cloudflare/platform-a.test.mjs 2>&1 | tee platform-a-test.log

      - name: Production safety guard
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RniE 'wrangler[[:space:]]+deploy|--remote|CLOUDFLARE_API_TOKEN|CLOUDFLARE_ACCOUNT_ID' \
            spikes/backend-correctness/platform-a-cloudflare

      - name: Upload Platform A diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-1ba-diagnostics-${{ github.sha }}
          path: platform-a-test.log
          if-no-files-found: error
