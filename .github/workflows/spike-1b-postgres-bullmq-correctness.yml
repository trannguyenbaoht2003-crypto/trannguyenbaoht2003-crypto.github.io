name: Sprint 1B-B PostgreSQL BullMQ Correctness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'spikes/backend-correctness/common/**'
      - 'spikes/backend-correctness/platform-b-postgres-bullmq/**'
      - '.github/workflows/spike-1b-postgres-bullmq-correctness.yml'

permissions:
  contents: read

jobs:
  correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hai_dau_correctness
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hai_dau_correctness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PLATFORM_B_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/hai_dau_correctness
      PLATFORM_B_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install repository dependencies
        run: npm ci

      - name: Install Platform B spike dependencies
        run: npm install --no-save --package-lock=false --ignore-scripts fastify@5 pg@8 bullmq@5 ioredis@5

      - name: Verify locked Common Harness
        run: node --test spikes/backend-correctness/common/common-harness.test.mjs

      - name: Run Platform B full suite three times
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p spikes/backend-correctness/platform-b-postgres-bullmq/evidence
          for run in 1 2 3; do
            echo "=== Platform B full run ${run}/3 ==="
            node --test \
              spikes/backend-correctness/platform-b-postgres-bullmq/platform-b.test.mjs \
              spikes/backend-correctness/platform-b-postgres-bullmq/platform-b.correctness.test.mjs \
              2>&1 | tee "spikes/backend-correctness/platform-b-postgres-bullmq/evidence/full-run-${run}.log"
          done

      - name: Produce JUnit report
        shell: bash
        run: |
          set -euo pipefail
          node --test --test-reporter=junit \
            spikes/backend-correctness/platform-b-postgres-bullmq/platform-b.test.mjs \
            spikes/backend-correctness/platform-b-postgres-bullmq/platform-b.correctness.test.mjs \
            > spikes/backend-correctness/platform-b-postgres-bullmq/evidence/test-report.xml

      - name: Generate evidence bundle
        run: node spikes/backend-correctness/platform-b-postgres-bullmq/generate-evidence.mjs

      - name: Verify evidence contract
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir=spikes/backend-correctness/platform-b-postgres-bullmq/evidence
          for file in \
            run-manifest.json \
            scenario-results.jsonl \
            test-report.xml \
            failure-injection.jsonl \
            record-counts-before.json \
            record-counts-after.json \
            checksums-before.json \
            checksums-after.json \
            duplicate-effects.json \
            audit-coverage.json \
            outbox-ledger.json \
            restore-report.json \
            immutable-diff.json \
            correctness-summary.md; do
            test -s "${evidence_dir}/${file}"
          done
          test "$(wc -l < "${evidence_dir}/scenario-results.jsonl")" -eq 24
          test "$(wc -l < "${evidence_dir}/failure-injection.jsonl")" -eq 12
          grep -q -- '- Status: PASS' "${evidence_dir}/correctness-summary.md"

      - name: Production safety guard
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RniE 'amazonaws|neon\.tech|supabase|upstash|rediscloud|kubectl|docker[[:space:]]+push' \
            spikes/backend-correctness/platform-b-postgres-bullmq \
            --exclude='*.log' \
            --exclude-dir=evidence
          permissions_block="$(sed -n '/^permissions:/,/^jobs:/p' .github/workflows/spike-1b-postgres-bullmq-correctness.yml)"
          echo "${permissions_block}" | grep -q 'contents: read'
          ! echo "${permissions_block}" | grep -q 'write'

      - name: Upload Platform B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-1bb-evidence-${{ github.sha }}
          path: spikes/backend-correctness/platform-b-postgres-bullmq/evidence
          if-no-files-found: error
