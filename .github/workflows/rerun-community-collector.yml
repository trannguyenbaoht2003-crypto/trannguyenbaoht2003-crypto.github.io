name: Deploy workflow dry run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "app/**"
      - "data/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"

permissions:
  contents: read

concurrency:
  group: deploy-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deploy-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate collector and moderation pipeline
        run: |
          npm run collect:community
          npm run moderate:community
          npm run validate:community
          npm run test:moderation

      - name: Build deploy artifact without publishing
        run: npm run build:pages

      - name: Validate generated artifact
        run: node --test tests/rendered-html.test.mjs

      - name: Confirm production deployment is disabled
        shell: bash
        run: |
          set -euo pipefail
          workflow=".github/workflows/rerun-community-collector.yml"
          executable="$RUNNER_TEMP/deploy-workflow-before-guard.yml"
          sed '/- name: Confirm production deployment is disabled/,$d' "$workflow" > "$executable"

          if grep -Eq 'contents:[[:space:]]*write|pages:[[:space:]]*write|id-token:[[:space:]]*write' "$workflow"; then
            echo "Write-capable deployment permission detected." >&2
            exit 1
          fi

          if grep -Eq 'git push|actions/deploy-pages|peaceiris/actions-gh-pages|cloudflare/wrangler-action|wrangler[[:space:]]+deploy' "$executable"; then
            echo "Production deployment command detected." >&2
            exit 1
          fi

          echo "Dry run only: no production deployment permission or command is present."

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-dry-run-${{ github.sha }}
          path: out/
          if-no-files-found: error
          retention-days: 3
